<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>MuayThai HIIT Pro</title>
    <style>
        :root { --bg: #050505; --accent: #39FF14; --rest: #ff3333; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; height: 100vh; margin: 0; }
        #timer { font-size: 7rem; font-weight: 800; color: var(--accent); }
        .card { background: #161616; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; border: 2px solid #333; text-align: center; }
        #instruction { font-size: 1.3rem; font-weight: bold; color: var(--accent); min-height: 80px; }
        #hint { font-size: 0.9rem; color: #aaa; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 15px 20px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status" style="color: var(--accent);">準備就緒</div>
    <div id="timer">01:00</div>
    
    <div class="card">
        <div id="instruction">點擊「開始」進入戰場</div>
        <div id="hint">師傅：保持專注，隨時準備出擊。</div>
    </div>

    <div class="controls">
        <button onclick="startTraining()" style="background:var(--accent)">開始/繼續</button>
        <button onclick="pauseTraining()" style="background:#444; color:white">暫停</button>
        <button onclick="skipCombo()" style="background:#555; color:white">跳過 ⏭</button>
        <button onclick="resetTimer()" style="background:var(--rest); color:white">重置</button>
    </div>

    <script>
        const library = [
            { c: "S-01: 右刺拳 → 右側滑步 → 左直拳 → 左低掃", s: "Right jab, side step, left cross, low kick", h: "提示：出左直拳時右腳同步向外踩。" },
            { c: "S-02: 右刺拳(引誘) → 左直拳穿透 → 外側旋轉 → 左掃踢", s: "Jab, left cross, pivot, left kick", h: "提示：後手直拳像鞭子一樣抽入去。" },
            { c: "S-03: 右勾拳(干擾) → 左上勾拳 → 左低掃", s: "Right hook, left uppercut, low kick", h: "提示：上勾拳穿透對手護頭的縫隙。" },
            { c: "O-01: 衝刺刺拳 → 左直拳 → 左膝撞 → 頸箍下壓", s: "Sprint jab, left cross, knee, clinch", h: "提示：膝撞時雙手用力向下扯。" },
            { c: "O-02: 假動作低掃(引誘) → 右直拳 → 左擺拳 → 左低掃", s: "Feint kick, right cross, left hook, low kick", h: "提示：假踢是為了騙起對手防守。" },
            { c: "O-03: 左掃踢(重擊) → 左擺拳 → 右勾拳 → 左低掃", s: "Left kick, left hook, right hook, low kick", h: "提示：掃踢落地後不要停，藉著餘力發動連擊。" },
            { c: "Counter-01: 閃避後手拳(滑步) → 左直拳反擊 → 左中掃", s: "Slip, left cross counter, middle kick", h: "提示：閃避對手的直拳，瞬間進行反擊。" },
            { c: "Trap-01: 刺拳(輕點) → 交叉換架攻擊(Switch) → 左後手重擊", s: "Jab, switch stance, left power punch", h: "提示：換架位嗰刻重心要低。" },
            { c: "Clinch-01: 刺拳(逼近) → 進入內圍 → 雙膝撞 → 轉身推開", s: "Jab, enter clinch, double knee, push", h: "提示：推開的一瞬間瞄準對方身體踢一腳。" },
            { c: "Power-01: 右刺拳 → 後撤步(引誘) → 左直拳重擊 → 左高掃", s: "Jab, back step, left cross, high kick", h: "提示：引誘對手追擊，隨即原地反擊重拳。" },
            { c: "Freestyle: 自由發揮", s: "Freestyle, express yourself", h: "提示：用直覺組合技術，專注節奏與平衡。" }
        ];

        let usedIndices = [], timeLeft = 60, isTraining = true, interval = null, isRunning = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function updateContent() {
            if (usedIndices.length === library.length) usedIndices = [];
            let index;
            do { index = Math.floor(Math.random() * library.length); } while (usedIndices.includes(index));
            usedIndices.push(index);
            const item = library[index];
            document.getElementById('instruction').innerText = item.c;
            document.getElementById('hint').innerText = item.h;
            speak(item.s);
        }

        function startTraining() {
            if (isRunning) return;
            isRunning = true;
            if (!interval) updateContent(); // 如果係剛開始，先出一條組合
            interval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
                } else {
                    isTraining = !isTraining;
                    timeLeft = isTraining ? 60 : 30;
                    document.getElementById('status').innerText = isTraining ? "訓練中" : "休息中";
                    if (isTraining) updateContent();
                    else {
                        document.getElementById('instruction').innerText = "休息時間";
                        speak("Rest now");
                    }
                }
            }, 1000);
        }

        function pauseTraining() {
            isRunning = false;
            clearInterval(interval);
            interval = null;
        }

        function skipCombo() { 
            timeLeft = 60;
            document.getElementById('timer').innerText = "01:00";
            updateContent();
        }

        function resetTimer() {
            pauseTraining();
            timeLeft = 60;
            usedIndices = [];
            document.getElementById('timer').innerText = "01:00";
            document.getElementById('status').innerText = "已重置";
            document.getElementById('instruction').innerText = "點擊「開始」進入戰場";
        }
    </script>
</body>
</html>
